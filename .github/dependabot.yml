version: 2
updates:
  # Website dependencies
  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "type: frontend"
    commit-message:
      prefix: "chore(deps)"
    
  # Admin Panel dependencies
  - package-ecosystem: "npm"
    directory: "/admin-panel"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "admin-panel"
    commit-message:
      prefix: "chore(deps)"
    
  # Desktop App dependencies
  - package-ecosystem: "npm"
    directory: "/desktop-app/greeting-friend-api-main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "desktop-app"
    commit-message:
      prefix: "chore(deps)"
    
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "type: infrastructure"
    commit-message:
      prefix: "chore(ci)"
